# i18n gallery — the localization authoring pattern, dogfooded.
#
# ONE `contentType: treatment` template defines the study structure;
# `${locale}` threads into BOTH the top-level `locale:` (driving
# stagebook's chrome catalog + RTL) and the prompt `file:` paths
# (selecting per-language content). Each arm supplies the value once,
# so the declaration and the content can never disagree.
#
# Use the viewer's treatment picker to flip between the English and
# Hebrew arms (or the header Locale dropdown to override the chrome
# preview-only). The Hebrew arm renders right-to-left: the slider
# mirrors, the timer label swaps sides, the char counter moves —
# while every recorded value stays identical to the English arm.
#
# The locale-consistency rule enforces the pairing: a prompt under
# prompts/he/ must declare `locale: he` in its frontmatter (an
# untagged prompt counts as English and fails validation under the
# Hebrew arm).

templates:
  - name: gallery-body
    contentType: treatment
    notes: |
      Structure defined once; ${locale} selects the per-language
      prompt files and sets the treatment's declared locale.
    content:
      name: i18n gallery ${locale}
      locale: ${locale}
      playerCount: 1
      gameStages:
        - name: intro
          duration: 600
          elements:
            - type: prompt
              file: prompts/${locale}/intro.prompt.md
            - type: submitButton

        - name: choices
          duration: 600
          elements:
            - type: prompt
              file: prompts/${locale}/radio.prompt.md
            - type: separator
            - type: prompt
              file: prompts/${locale}/checkbox.prompt.md
            - type: submitButton

        - name: slider
          duration: 600
          notes: |
            The RTL showcase: under the Hebrew arm the slider mirrors
            (min paints on the right), matching reading direction,
            while min still records as min.
          elements:
            - type: prompt
              file: prompts/${locale}/slider.prompt.md
            - type: submitButton

        - name: writing
          duration: 90
          notes: |
            Open response with a character counter (count-neutral
            catalog string) plus the stage timer — both localize.
          elements:
            - type: timer
            - type: prompt
              file: prompts/${locale}/open.prompt.md
            - type: submitButton


treatments:
  - template: gallery-body
    fields:
      locale: en
  - template: gallery-body
    fields:
      locale: he
